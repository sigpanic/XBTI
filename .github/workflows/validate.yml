name: Validate Test Configurations

on:
  push:
    branches: [ master ]
    paths:
      - 'src/instance/**'
      - 'src/core/**'
      - 'src/protocol/**'
      - 'scripts/**'
  pull_request:
    branches: [ master ]
    paths:
      - 'src/instance/**'
      - 'src/core/**'
      - 'src/protocol/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate all test configurations
        run: npm run test:validate
